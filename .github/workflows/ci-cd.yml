name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project:
          - name: p1-foundations
            pythonpath: shared:p1-foundations
            testdir: p1-foundations/tests
          - name: p2-conversational
            pythonpath: shared:p2-conversational
            testdir: p2-conversational/tests
          - name: p3-quality
            pythonpath: shared:p3-quality
            testdir: p3-quality/tests
          - name: p4-autonomous
            pythonpath: shared:p4-autonomous
            testdir: p4-autonomous/tests
          - name: p5-advanced
            pythonpath: p5-advanced
            testdir: p5-advanced/tests
    name: test-${{ matrix.project.name }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ${{ matrix.project.name }}/requirements.txt

      - name: Install dependencies
        run: pip install -r ${{ matrix.project.name }}/requirements.txt

      - name: Test
        run: PYTHONPATH=${{ matrix.project.pythonpath }} pytest ${{ matrix.project.testdir }} -v --tb=short

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy P1 + P5 to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/cloudaura-rag
            git pull origin main
            docker compose build rag-p1 rag-p5
            docker compose up -d ollama rag-p1 rag-p5
        continue-on-error: true

  smoke-test:
    needs: deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Wait for deploy
        run: sleep 30

      - name: Health check P1
        run: |
          HTTP_STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            "https://ragdocs.cloudaura.cloud/health" --max-time 10) || true
          echo "P1 health: $HTTP_STATUS"
          [ "$HTTP_STATUS" = "200" ] || echo "WARNING: P1 returned $HTTP_STATUS"

      - name: Health check P5
        run: |
          HTTP_STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            "https://rag-graph.cloudaura.cloud/health" --max-time 10) || true
          echo "P5 health: $HTTP_STATUS"
          [ "$HTTP_STATUS" = "200" ] || echo "WARNING: P5 returned $HTTP_STATUS"
