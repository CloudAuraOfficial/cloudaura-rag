    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8015/health', timeout=5).raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    restart: unless-stopped

volumes:
  model_cache:
  p1_chroma:
  p2_chroma:
  p3_chroma:
  p4_chroma:
  p5_lightrag:

networks:
  ollama-net:
    external: true
