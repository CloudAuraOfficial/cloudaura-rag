services:
  # ── RAG-P1 Foundations (port 8001) ──────────────
  # Ollama: uses shared instance via ollama-net (see ~/ollama-infra/)
  # Patterns: Simple RAG + HyDE
  rag-p1:
    build:
      context: .
      dockerfile: p1-foundations/Dockerfile
    container_name: rag-p1-foundations
    mem_limit: 1.5g
    ports:
      - "127.0.0.1:8001:8001"
    environment:
      - OLLAMA_BASE_URL=http://ollama-shared:11434
      - LLM_MODEL=${LLM_MODEL:-phi3:mini}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
      - RERANKER_MODEL=${RERANKER_MODEL:-cross-encoder/ms-marco-MiniLM-L-6-v2}
      - CHUNK_SIZE=${CHUNK_SIZE:-512}
      - CHUNK_OVERLAP=${CHUNK_OVERLAP:-64}
      - BM25_TOP_K=${BM25_TOP_K:-20}
      - VECTOR_TOP_K=${VECTOR_TOP_K:-20}
      - RERANK_TOP_K=${RERANK_TOP_K:-5}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - p1_chroma:/app/chroma_data
      - model_cache:/app/model_cache
    networks:
      - ollama-net
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8001/health', timeout=5).raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    restart: unless-stopped

